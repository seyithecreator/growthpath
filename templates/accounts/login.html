<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — GrowthPath</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    body {
      background: #09090F;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #E2E8F0;
    }
    .login-wrap {
      width: 100%; max-width: 400px; padding: 16px;
    }
    .login-card {
      background: #13131F;
      border: 1px solid #2A2A3D;
      border-radius: 18px; padding: 36px 32px;
    }
    .logo-box {
      width: 52px; height: 52px; border-radius: 14px;
      background: #A855F7; color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin: 0 auto 14px;
    }
    .gp-input {
      background: #1C1C2E; border: 1px solid #2A2A3D;
      border-radius: 9px; padding: 10px 14px;
      font-size: 14px; width: 100%; color: #E2E8F0;
      outline: none; transition: border .15s;
    }
    .gp-input:focus {
      border-color: #A855F7;
      box-shadow: 0 0 0 3px rgba(168,85,247,.2);
    }
    .gp-input::placeholder { color: #3D3D5C; }
    .gp-label { font-size: 13px; font-weight: 500; color: #6B7280; margin-bottom: 5px; display: block; }
    .gp-btn {
      background: #A855F7; border: none; border-radius: 99px;
      color: #fff; font-weight: 600; font-size: 14px;
      width: 100%; padding: 11px; cursor: pointer; transition: background .15s;
    }
    .gp-btn:hover { background: #7C3AED; }
    .gp-divider {
      border: none; border-top: 1px solid #2A2A3D; margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="logo-box"><i class="ti ti-trending-up"></i></div>
      <h1 style="font-size:24px;font-weight:800;margin-bottom:4px">GrowthPath</h1>
      <p style="font-size:13px;color:#6B7280">Personal Growth & Skill Development</p>
    </div>

    <div class="login-card">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px;text-align:center">Sign in</h2>

      {% if form.errors %}
      <div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:10px 14px;font-size:13px;color:#EF4444;margin-bottom:16px">
        <i class="ti ti-alert-circle"></i> Invalid username or password.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="gp-label">Username</label>
          <input type="text" name="username" class="gp-input" placeholder="e.g. tunde_a" autofocus required>
        </div>
        <div class="mb-4">
          <label class="gp-label">Password</label>
          <input type="password" name="password" class="gp-input" placeholder="••••••••" required>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="gp-btn">Sign in →</button>
      </form>

      <hr class="gp-divider">
      <p style="text-align:center;font-size:12px;color:#3D3D5C;margin:0">
        Sample accounts: <strong style="color:#6B7280">tunde_a, chioma_o, emeka_n</strong><br>
        Password: <strong style="color:#6B7280">testpass123</strong>
      </p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
