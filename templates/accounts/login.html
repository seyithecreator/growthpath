<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — GrowthPath</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <!-- Anti-flash: apply saved theme before CSS renders -->
  <script>(function(){var t=localStorage.getItem('gp-theme')||'dark';document.documentElement.setAttribute('data-theme',t);document.documentElement.setAttribute('data-bs-theme',t);})();</script>
  <style>
    :root {
      --login-bg:      #09090F;
      --login-card:    #13131F;
      --login-border:  #2A2A3D;
      --login-text:    #E2E8F0;
      --login-muted:   #6B7280;
      --login-input:   #1C1C2E;
      --login-ph:      #3D3D5C;
      --login-purple:  #A855F7;
      --login-purple2: #7C3AED;
    }
    [data-theme="light"] {
      --login-bg:      #F8F7FF;
      --login-card:    #FFFFFF;
      --login-border:  #E4DFFF;
      --login-text:    #1A1033;
      --login-muted:   #6B7280;
      --login-input:   #F3F0FF;
      --login-ph:      #C4B5FD;
      --login-purple:  #7C3AED;
      --login-purple2: #6D28D9;
    }
    body {
      background: var(--login-bg);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: var(--login-text);
    }
    .login-wrap { width: 100%; max-width: 400px; padding: 16px; }
    .login-card {
      background: var(--login-card);
      border: 1px solid var(--login-border);
      border-radius: 18px; padding: 36px 32px;
    }
    .logo-box {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--login-purple); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin: 0 auto 14px;
    }
    .gp-input {
      background: var(--login-input); border: 1px solid var(--login-border);
      border-radius: 9px; padding: 10px 14px;
      font-size: 14px; width: 100%; color: var(--login-text);
      outline: none; transition: border .15s;
    }
    .gp-input:focus {
      border-color: var(--login-purple);
      box-shadow: 0 0 0 3px rgba(168,85,247,.2);
    }
    .gp-input::placeholder { color: var(--login-ph); }
    .gp-label { font-size: 13px; font-weight: 500; color: var(--login-muted); margin-bottom: 5px; display: block; }
    .gp-btn {
      background: var(--login-purple); border: none; border-radius: 99px;
      color: #fff; font-weight: 600; font-size: 14px;
      width: 100%; padding: 11px; cursor: pointer; transition: background .15s;
    }
    .gp-btn:hover { background: var(--login-purple2); }
    .gp-divider { border: none; border-top: 1px solid var(--login-border); margin: 24px 0; }
    .gp-pw-wrap { position: relative; }
    .gp-pw-wrap .gp-input { padding-right: 40px; }
    .gp-pw-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--login-ph);
      font-size: 17px; padding: 0; line-height: 1; transition: color .15s;
    }
    .gp-pw-eye:hover { color: var(--login-purple); }
    /* Toggle button */
    .gp-toggle-login {
      position: fixed; top: 16px; right: 16px;
      background: var(--login-card); border: 1px solid var(--login-border);
      border-radius: 8px; padding: 6px 10px; cursor: pointer;
      font-size: 18px; color: var(--login-muted); transition: all .2s; z-index: 100;
    }
    .gp-toggle-login:hover { color: var(--login-purple); border-color: var(--login-purple); }
  </style>
</head>
<body>
  <!-- Theme toggle (top-right corner) -->
  <button class="gp-toggle-login" id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark">
    <i class="ti gp-theme-icon"></i>
  </button>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="text-center mb-4">
      <div class="logo-box"><i class="ti ti-trending-up"></i></div>
      <h1 style="font-size:24px;font-weight:800;margin-bottom:4px">GrowthPath</h1>
      <p style="font-size:13px;color:var(--login-muted)">Personal Growth & Skill Development</p>
    </div>

    <div class="login-card">
      <h2 style="font-size:18px;font-weight:700;margin-bottom:20px;text-align:center">Sign in</h2>

      {% if form.errors %}
      <div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:10px 14px;font-size:13px;color:#EF4444;margin-bottom:16px">
        <i class="ti ti-alert-circle"></i> Invalid username or password.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="gp-label">Username</label>
          <input type="text" name="username" class="gp-input" placeholder="e.g. tunde_a" autofocus required>
        </div>
        <div class="mb-4">
          <label class="gp-label">Password</label>
          <div class="gp-pw-wrap">
            <input type="password" name="password" id="id_password" class="gp-input" placeholder="••••••••" required>
            <button type="button" class="gp-pw-eye" onclick="togglePw('id_password',this)" tabindex="-1" title="Show password">
              <i class="ti ti-eye"></i>
            </button>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="gp-btn">Sign in →</button>
      </form>

      <hr class="gp-divider">
      <p style="text-align:center;font-size:13px;color:var(--login-muted);margin:0 0 12px">
        Don't have an account?
        <a href="{% url 'accounts:register' %}" style="color:var(--login-purple);font-weight:600">Sign up</a>
      </p>
      <p style="text-align:center;font-size:12px;color:var(--login-ph);margin:0">
        Sample accounts: <strong style="color:var(--login-muted)">tunde_a, chioma_o, emeka_n</strong><br>
        Password: <strong style="color:var(--login-muted)">testpass123</strong>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  function togglePw(id, btn) {
    var inp = document.getElementById(id);
    var showing = inp.type === 'text';
    inp.type = showing ? 'password' : 'text';
    btn.querySelector('i').className = showing ? 'ti ti-eye' : 'ti ti-eye-off';
  }
  (function() {
    function getTheme() { return localStorage.getItem('gp-theme') || 'dark'; }
    function applyIcon(theme) {
      document.querySelectorAll('.gp-theme-icon').forEach(function(el) {
        el.className = 'ti ' + (theme === 'dark' ? 'ti-moon' : 'ti-sun');
      });
    }
    applyIcon(getTheme());
    document.getElementById('themeToggle').addEventListener('click', function() {
      var next = getTheme() === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      document.documentElement.setAttribute('data-bs-theme', next);
      localStorage.setItem('gp-theme', next);
      applyIcon(next);
    });
  })();
  </script>
</body>
</html>
